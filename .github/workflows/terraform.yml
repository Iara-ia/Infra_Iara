# CI do Infra_Iara: valida formatação e sintaxe do Terraform em cada PR/push.
# NÃO faz apply (o scaffold tem placeholders). `validate` roda sem credenciais AWS.
name: terraform

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
