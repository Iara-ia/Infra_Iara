# Template de referência do CI do Front-Iara (o arquivo ATIVO vive em Front-Iara/.github/workflows/ci.yml).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3333
